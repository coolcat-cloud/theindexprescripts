<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixel Korean Typing</title>
  <style>
    @font-face {
      font-family: "PixelKR";
      src: url("./font/DungGeunMoRegular.woff.ttf") format("truetype");
      font-display: block;
    }

    html, body {
      margin: 0;
      background: #000;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    canvas {
      background: #000;
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>

  <script>
    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d", { alpha: false });

    const bgColor = "#000000";
    const pixelMain = "#9CDBFF";
    const glowOuter = "rgba(40, 170, 255, 0.38)";
    const glowMid   = "rgba(0, 140, 255, 0.82)";
    const glowInner = "rgba(180, 255, 255, 0.95)";

    const PADDING_X = 48;
    const PADDING_Y = 36;
    const LINE_HEIGHT_RATIO = 1.45;

    const TYPE_STEP_DELAY = 42;
    const HOLD_AFTER_DONE = 1200;

    let frameTimer = null;
    let currentFullText = "";

    const prescripts = [
"딸기 케이크에 바늘 3개를 넣어라.",
"그림 속 여인에게 꽃을 선물한 후 뒤집어라.",
"70층 이상의 건물 옥상에서 운동화를 3개 던져라.",
"왼쪽 검지를 뽑아 5분동안 익힌 후 젓가락으로 먹어라.",
"하수구 계단에서 아무 시나 읊어라.",
"7시 15분 이후에 대화한 사람중 38번째로 대화한 사람의 눈알을 뽑아라.",
"가장 가까운 편의점에서 3번 노크하라.",
"07시 43분에 창문을 세 번 열고 네 번째에는 열지 말아라.",
"가장 먼저 떠오르는 단어를 종이에 쓰고 즉시 접어라.",
"세 번째로 보이는 물체의 방향을 자신의 쪽으로 돌려놓아라.",
"계단이 있다면 네 번째 단만 밟아라.",
"방 안의 사각형을 하나 선택하고 6초간 응시한 후 불에 태워라.",
"왼손으로 오른쪽 손목을 잡고 2초 후 놓아라.",
"03시 12분에 창문을 두 번 열고 다시 닫아라.",
"자신의 이름을 속으로 천천히 한 번 불러라.",
"손톱 20개를 뽑아 차를 우려내라.",
"7시에 일어난 후 2번째로 본 사람의 머리카락 162가닥을 뽑은 후 근처 우편함에 버려라.",
"하루동안 손을 총 4번 씻어라.",
"가장 어두운 카페에 들어가 카페라떼 3잔을 주문하고 한 잔에 맹독 8방울을 넣어라.",
"자신의 그림을 죽여라.",
"가까운 공원에서 22살 먹은 사람들의 다리를 부러뜨려라.",
"19시 51분 29초에 창밖으로 15초간 고함을 질러라.",
"자신의 왼손과 오른손을 스스로 잘라내라.",
"2분 동안 아무 말도 하지 말아라.",
"20초동안 스트레칭을 하며 몸을 풀어라.",
"내일 11시 38분에 아무 횡단보도에 가서 호루라기를 불어라.",
"가구제작기능사 필기시험을 공부한 후 합격하여라.",
"20개의 도마와 82개의 식칼을  구입하여라.",
"우물 속 사나이를 미워하여라.",
"늙은 의사에게 병을 진단받아라.",
"14시 22분 대형 소핑몰의 엘레베이터를 망가뜨려라",
"두 손을 주머니에 넣고 더듬거려라.",
"새벽이 올 때 죽어가는 사람들에게 검은 옷을 입혀라.",
"새벽이 올 때 살아가는 사람들에게 흰 옷을 입혀라.",
"초록색 전화기 35개를 파괴하여라.",
"오늘 만난 사람 중 51번째로 목격한 사람과 오른팔을 교환하여라.",
"4분동안 복도에서 마주친 모든 사람들에게 가위바위보를 제안하고 5번 이상 져라.",
"58분 17초 동안 눈을 깜빡이지 말아라.",
"양갈래 머리를 한 여자에게 대파 1개를 쥐여줘라.",
"저녁식사 후 홍차를 1L 마셔라.",
"시야 안에 존재하는 모든 사람들의 이름을 물어본 후 외워라.",
"하얀 생머리를 한 여성과 결혼하여라.",
"뒷골목에서 아무 악기나 연주하여라.",
"빨간색 꽃병을 투명하게 만들어라.",
    ];

    const CHO = [
      "ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ",
      "ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"
    ];

    const JUNG = [
      "ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ",
      "ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"
    ];

    const JONG = [
      "",
      "ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ",
      "ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"
    ];

    const DOUBLE_JUNG_MAP = {
      "ㅘ": ["ㅗ", "ㅏ"],
      "ㅙ": ["ㅗ", "ㅐ"],
      "ㅚ": ["ㅗ", "ㅣ"],
      "ㅝ": ["ㅜ", "ㅓ"],
      "ㅞ": ["ㅜ", "ㅔ"],
      "ㅟ": ["ㅜ", "ㅣ"],
      "ㅢ": ["ㅡ", "ㅣ"]
    };

    const DOUBLE_JONG_MAP = {
      "ㄳ": ["ㄱ", "ㅅ"],
      "ㄵ": ["ㄴ", "ㅈ"],
      "ㄶ": ["ㄴ", "ㅎ"],
      "ㄺ": ["ㄹ", "ㄱ"],
      "ㄻ": ["ㄹ", "ㅁ"],
      "ㄼ": ["ㄹ", "ㅂ"],
      "ㄽ": ["ㄹ", "ㅅ"],
      "ㄾ": ["ㄹ", "ㅌ"],
      "ㄿ": ["ㄹ", "ㅍ"],
      "ㅀ": ["ㄹ", "ㅎ"],
      "ㅄ": ["ㅂ", "ㅅ"]
    };

    function resizeCanvas() {
      const width = Math.min(window.innerWidth, 1280);
      const height = Math.min(window.innerHeight, 420);

      canvas.width = width;
      canvas.height = height;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
    }

    function clearMain() {
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function getRandomPrescript() {
      return prescripts[Math.floor(Math.random() * prescripts.length)];
    }

    function wrapText(ctx2d, text, maxWidth) {
      const lines = [];
      let current = "";

      for (const ch of text) {
        if (ch === "\n") {
          lines.push(current);
          current = "";
          continue;
        }

        const test = current + ch;
        if (ctx2d.measureText(test).width > maxWidth && current.length > 0) {
          lines.push(current);
          current = ch;
        } else {
          current = test;
        }
      }

      if (current || lines.length === 0) lines.push(current);
      return lines;
    }

    function chooseLayout(text) {
      const maxWidth = canvas.width - PADDING_X * 2;
      const maxHeight = canvas.height - PADDING_Y * 2;
      const sizes = [56, 48, 40, 32, 28, 24, 20, 16];

      for (const size of sizes) {
        ctx.font = `normal ${size}px "PixelKR", monospace`;
        const lines = wrapText(ctx, text || " ", maxWidth);
        const lineHeight = Math.ceil(size * LINE_HEIGHT_RATIO);
        const totalHeight = lines.length * lineHeight;

        if (totalHeight <= maxHeight) {
          return { size, lines, lineHeight };
        }
      }

      const fallback = 16;
      ctx.font = `normal ${fallback}px "PixelKR", monospace`;
      return {
        size: fallback,
        lines: wrapText(ctx, text || " ", maxWidth),
        lineHeight: Math.ceil(fallback * LINE_HEIGHT_RATIO)
      };
    }

    function drawPixelText(text) {
      clearMain();

      const { size, lines, lineHeight } = chooseLayout(text);

      ctx.save();
      ctx.font = `normal ${size}px "PixelKR", monospace`;
      ctx.textBaseline = "top";
      ctx.textAlign = "left";
      ctx.imageSmoothingEnabled = false;

      const totalHeight = lines.length * lineHeight;
      let y = Math.floor((canvas.height - totalHeight) / 2);

      for (const line of lines) {
        const width = ctx.measureText(line).width;
        const x = Math.floor((canvas.width - width) / 2);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        ctx.filter = "blur(6px)";
        ctx.globalAlpha = 0.38;
        ctx.fillStyle = glowOuter;
        ctx.fillText(line, x, y);

        ctx.filter = "blur(2.2px)";
        ctx.globalAlpha = 0.82;
        ctx.fillStyle = glowMid;
        ctx.fillText(line, x, y);

        ctx.filter = "blur(0.8px)";
        ctx.globalAlpha = 1;
        ctx.fillStyle = glowInner;
        ctx.fillText(line, x, y);
        ctx.restore();

        ctx.save();
        ctx.filter = "none";
        ctx.globalAlpha = 1;
        ctx.fillStyle = pixelMain;
        ctx.fillText(line, x, y);
        ctx.restore();

        y += lineHeight;
      }

      ctx.restore();
    }

    function isHangulSyllable(ch) {
      const code = ch.charCodeAt(0);
      return code >= 0xAC00 && code <= 0xD7A3;
    }

    function decomposeHangul(ch) {
      const code = ch.charCodeAt(0) - 0xAC00;
      const cho = Math.floor(code / 588);
      const jung = Math.floor((code % 588) / 28);
      const jong = code % 28;
      return { cho, jung, jong };
    }

    function composeSyllable(choIndex, jungIndex, jongIndex = 0) {
      return String.fromCharCode(0xAC00 + choIndex * 588 + jungIndex * 28 + jongIndex);
    }

    function getTypingFramesForChar(ch) {
      if (!isHangulSyllable(ch)) {
        return [ch];
      }

      const { cho, jung, jong } = decomposeHangul(ch);
      const frames = [];

      frames.push(CHO[cho]);

      const jungChar = JUNG[jung];
      if (DOUBLE_JUNG_MAP[jungChar]) {
        const [firstVowel] = DOUBLE_JUNG_MAP[jungChar];
        const firstJungIndex = JUNG.indexOf(firstVowel);
        frames.push(composeSyllable(cho, firstJungIndex, 0));
      }

      frames.push(composeSyllable(cho, jung, 0));

      if (jong > 0) {
        const jongChar = JONG[jong];
        if (DOUBLE_JONG_MAP[jongChar]) {
          const [firstFinal] = DOUBLE_JONG_MAP[jongChar];
          const firstFinalIndex = JONG.indexOf(firstFinal);
          frames.push(composeSyllable(cho, jung, firstFinalIndex));
        }
        frames.push(ch);
      }

      return frames;
    }

    function buildTypingSequence(text) {
      const sequence = [];
      let committed = "";

      for (const ch of text) {
        const frames = getTypingFramesForChar(ch);
        for (const partial of frames) {
          sequence.push(committed + partial);
        }
        committed += ch;
      }

      if (sequence.length === 0) {
        sequence.push("");
      }

      return sequence;
    }

    function stopAnimation() {
      if (frameTimer) clearTimeout(frameTimer);
      frameTimer = null;
    }

    function startTypingEffect(text = getRandomPrescript()) {
      stopAnimation();

      currentFullText = text;
      const frames = buildTypingSequence(text);
      let i = 0;

      function nextFrame() {
        drawPixelText(frames[i] ?? text);
        i++;

        if (i < frames.length) {
          frameTimer = setTimeout(nextFrame, TYPE_STEP_DELAY);
        } else {
          frameTimer = setTimeout(() => {
            drawPixelText(text);
          }, HOLD_AFTER_DONE);
        }
      }

      drawPixelText("");
      nextFrame();
    }

    window.addEventListener("resize", () => {
      resizeCanvas();
      drawPixelText(currentFullText || "");
    });

    document.body.addEventListener("click", () => {
      startTypingEffect();
    });

    resizeCanvas();
    startTypingEffect();
  </script>
</body>
</html>
